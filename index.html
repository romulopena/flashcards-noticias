<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards Mitos e verdades</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="cabecalho">
        <h1>Confere aí</h1>
        <nav>
            <a href="#">Início</a>
        </nav>
    </header>

    <main>
        <h2>Descubra a verdade passando o mouse</h2>
        <section>
            <article class="cartao">
                <div class="cartao-interno">
                    <div class="cartao-frente">
                        <img src="tubarao.png" alt="Tubarão" class="cartao-imagem">
                        <p>Tubarões podem sentir uma gota de sangue a quilômetros de distância.</p>
                    </div>
                    <div class="cartao-verso">
                        <img src="tubarao.png" alt="Tubarão" class="cartao-imagem">
                        <p>Eles têm um olfato incrível, mas o sangue precisa estar diluído em um volume menor de água.</p>
                    </div>
                </div>
            </article>
        </section>
    </main>

    <footer>
        <p>Projeto feito por Professor Rômulo</p>
    </footer>

</body>
</html>
